user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Map service hosts (Docker DNS).
    upstream auth_upstream    { server auth-service:8080; }
    upstream user_upstream    { server user-service:8080; }
    upstream product_upstream { server product-service:8080; }
    upstream order_upstream   { server order-service:8080; }
    upstream chat_upstream    { server chat-service:8080; }

    server {
        listen 80;
        server_name _;

        # Static frontend.
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Routing rules: each prefix goes to the right service.
        location /api/auth/    { proxy_pass http://auth_upstream/auth/; include /etc/nginx/proxy_params.conf; }
        location /api/users    { proxy_pass http://user_upstream/users; include /etc/nginx/proxy_params.conf; }
        location /api/products { proxy_pass http://product_upstream/products; include /etc/nginx/proxy_params.conf; }
        location /api/orders   { proxy_pass http://order_upstream/orders; include /etc/nginx/proxy_params.conf; }
        location /api/chat/    { proxy_pass http://chat_upstream/chat/; include /etc/nginx/proxy_params.conf; }

        # Convenience health endpoints exposed via the gateway.
        location /healthz/auth    { proxy_pass http://auth_upstream/health; }
        location /healthz/user    { proxy_pass http://user_upstream/health; }
        location /healthz/product { proxy_pass http://product_upstream/health; }
        location /healthz/order   { proxy_pass http://order_upstream/health; }
        location /healthz/chat    { proxy_pass http://chat_upstream/health; }
    }
}
