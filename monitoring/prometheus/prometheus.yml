global:
  scrape_interval: 10s
  scrape_timeout: 5s
  evaluation_interval: 15s

# Wire in Alertmanager so alerts go somewhere.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load alert rule files.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'auth-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:8080']
        labels: { service: auth-service }

  - job_name: 'user-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['user-service:8080']
        labels: { service: user-service }

  - job_name: 'product-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['product-service:8080']
        labels: { service: product-service }

  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['order-service:8080']
        labels: { service: order-service }

  - job_name: 'chat-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['chat-service:8080']
        labels: { service: chat-service }

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # cAdvisor - per-container CPU, memory, network metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # node-exporter - host-level CPU/memory/disk
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
