name: sre-microservices

x-go-build: &go-build
  context: .
  dockerfile: Dockerfile

x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${POSTGRES_USER:-app}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-app}
  DB_NAME: ${POSTGRES_DB:-app}
  DB_SSLMODE: disable
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

# Reusable healthcheck for Go services - all expose /health on port 8080.
x-go-healthcheck: &go-healthcheck
  test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
  interval: 10s
  timeout: 3s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks: [appnet]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    networks: [appnet]

  auth-service:
    build:
      <<: *go-build
      args:
        SERVICE: auth-service
    container_name: auth-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
    healthcheck: *go-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped
    networks: [appnet]

  user-service:
    build:
      <<: *go-build
      args:
        SERVICE: user-service
    container_name: user-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      GRPC_PORT: "9000"
    healthcheck: *go-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped
    networks: [appnet]

  product-service:
    build:
      <<: *go-build
      args:
        SERVICE: product-service
    container_name: product-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      GRPC_PORT: "9000"
    healthcheck: *go-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped
    networks: [appnet]

  order-service:
    build:
      <<: *go-build
      args:
        SERVICE: order-service
    container_name: order-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      USER_GRPC_ADDR: user-service:9000
      PRODUCT_GRPC_ADDR: product-service:9000
    healthcheck: *go-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      user-service: { condition: service_started }
      product-service: { condition: service_started }
    deploy:
      resources:
        limits:
          cpus: '1.0'        # order-service is the most resource-hungry
          memory: 256M
    restart: unless-stopped
    networks: [appnet]

  chat-service:
    build:
      <<: *go-build
      args:
        SERVICE: chat-service
    container_name: chat-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
    healthcheck: *go-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped
    networks: [appnet]

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
    restart: unless-stopped
    networks: [appnet]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [appnet]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks: [appnet]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks: [appnet]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks: [appnet]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [appnet]

volumes:
  pgdata:
  promdata:
  grafanadata:

networks:
  appnet:
    driver: bridge
