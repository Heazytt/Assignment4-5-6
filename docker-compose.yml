name: sre-microservices

x-go-build: &go-build
  context: .
  dockerfile: Dockerfile

x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  JWT_SECRET: ${JWT_SECRET}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${POSTGRES_USER:-app}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-app}
  DB_NAME: ${POSTGRES_DB:-app}
  DB_SSLMODE: disable
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [appnet]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [appnet]

  auth-service:
    build:
      <<: *go-build
      args:
        SERVICE: auth-service
    container_name: auth-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [appnet]
    restart: unless-stopped

  user-service:
    build:
      <<: *go-build
      args:
        SERVICE: user-service
    container_name: user-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      GRPC_PORT: "9000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [appnet]
    restart: unless-stopped

  product-service:
    build:
      <<: *go-build
      args:
        SERVICE: product-service
    container_name: product-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      GRPC_PORT: "9000"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [appnet]
    restart: unless-stopped

  order-service:
    build:
      <<: *go-build
      args:
        SERVICE: order-service
    container_name: order-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      USER_GRPC_ADDR: user-service:9000
      PRODUCT_GRPC_ADDR: product-service:9000
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      user-service: { condition: service_started }
      product-service: { condition: service_started }
    networks: [appnet]
    restart: unless-stopped

  chat-service:
    build:
      <<: *go-build
      args:
        SERVICE: chat-service
    container_name: chat-service
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [appnet]
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
    networks: [appnet]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks: [appnet]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks: [appnet]
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:

networks:
  appnet:
    driver: bridge
